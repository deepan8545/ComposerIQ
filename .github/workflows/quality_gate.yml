name: ComposerIQ Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff && ruff check . --ignore E501

  ragas-gate:
    runs-on: ubuntu-latest
    needs: lint
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Run RAGAS quality gate
        run: |
          python -c "
          from evaluation.ragas_eval import RagasEvaluator
          result = RagasEvaluator().run_ci_benchmark('tests/eval_cases.json')
          print(result)
          assert result['ci_verdict'] == 'PASS', f'GATE FAILED: {result}'
          "

  smoke-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: |
          pip install fastapi uvicorn python-dotenv
          echo "DEMO_MODE=true" > .env
          uvicorn main:app --port 8001 &
          sleep 5
          curl -f http://localhost:8001/health
